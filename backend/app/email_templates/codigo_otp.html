<h2 style="color:#2C2926;font-size:20px;margin:0 0 12px">Hola, {{nombre}}</h2>
<p style="color:#4A4540;line-height:1.6;margin:0 0 20px">
  Tu código de verificación para restablecer tu contraseña es:
</p>
<div style="text-align:center;margin:24px 0">
  <div style="display:inline-block;background:#F5F0FF;border:2px solid #7C4DFF;border-radius:12px;padding:16px 32px;letter-spacing:8px;font-size:32px;font-weight:700;color:#4A2D8C;font-family:monospace">
    {{codigo}}
  </div>
</div>
<p style="color:#4A4540;line-height:1.6;margin:0 0 8px">
  Ingresá este código en la app para continuar.
</p>
<p style="color:#8A8580;font-size:13px;line-height:1.5;margin:0">
  El código expira en 10 minutos. Si no solicitaste esto, ignorá este email.
</p>
