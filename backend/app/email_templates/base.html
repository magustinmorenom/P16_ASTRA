<!DOCTYPE html>
<html lang="es">
<head>

    <tr>
      <td align="center">

          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#7C4DFF,#B388FF);padding:28px 32px;text-align:center">

              <p style="margin:4px 0 0;color:rgba(255,255,255,0.8);font-size:13px">CosmicEngine</p>
            </td>
          </tr>
          <!-- Body -->
          <tr>
            <td style="padding:32px">
              {{contenido}}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:20px 32px;border-top:1px solid #F0EDE8;text-align:center">
              <p style="margin:0;color:#C5C0BC;font-size:11px;line-height:1.5">
                ASTRA CosmicEngine — Tu mapa cósmico personal<br>
