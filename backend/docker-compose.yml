services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cosmic
      POSTGRES_PASSWORD: cosmic123
      POSTGRES_DB: cosmicengine
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
