services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cosmic
      POSTGRES_PASSWORD: cosmic123
      POSTGRES_DB: cosmicengine
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cosmicminio
      MINIO_ROOT_PASSWORD: cosmicminio123
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
