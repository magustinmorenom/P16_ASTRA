name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: "postgresql+asyncpg://ci:ci@localhost:5432/ci"
      DATABASE_URL_SYNC: "postgresql://ci:ci@localhost:5432/ci"
      REDIS_URL: "redis://localhost:6379/0"
      CLAVE_SECRETA: "ci-secret-key-not-real"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Instalar dependencias del sistema
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Instalar dependencias Python
        run: pip install ".[dev]"

      - name: Lint con Ruff
        run: ruff check .

      - name: Tests con Pytest
        run: pytest --tb=short -q

  frontend:
    name: Frontend — Lint, Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
